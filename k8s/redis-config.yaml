apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: researchpadi
data:
  redis.conf: |
    maxmemory 2gb
    maxmemory-policy allkeys-lru
    appendonly yes
    appendfsync everysec
    save 900 1
    save 300 10
    save 60 10000
    tcp-keepalive 300
    timeout 0
    databases 16
    hz 10
    dynamic-hz yes
