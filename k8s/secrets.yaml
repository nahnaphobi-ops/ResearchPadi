# =====================================================================
# Secrets manifest — DO NOT COMMIT REAL VALUES
# ---------------------------------------------------------------------
# This file declares the Secret structure only. Populate it via one of:
#   1. kubectl create secret generic researchpadi-secrets \
#        --namespace researchpadi \
#        --from-literal=redis-url='redis://redis-service:6379' \
#        --from-literal=supabase-url='...' \
#        --from-literal=supabase-service-role-key='...' \
#        --from-literal=jwt-secret='...' \
#        --from-literal=database-url='...' \
#        --from-literal=anthropic-api-key='...' \
#        --from-literal=openai-api-key='...' \
#        --from-literal=hubtel-client-id='...' \
#        --from-literal=hubtel-client-secret='...' \
#        --from-literal=hubtel-sender-id='ResearchPadi'
#
#   2. (Recommended) seal it with sealed-secrets /External Secrets Operator
#      backed by your cloud secret manager (AWS Secrets Manager, GCP
#      Secret Manager, or Doppler). At 15-20K concurrent you MUST rotate
#      API keys and have least-privilege service-role keys.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: researchpadi-secrets
  namespace: researchpadi
type: Opaque
stringData:
  # Point this at your HA Redis (Sentinel service or managed Redis).
  # For the in-cluster Sentinel setup shipped here, use:
  #   redis://researchpadi-redis-sentinel:26379  (sentinel-aware client)
  # or the direct headless service for non-sentinel clients:
  redis-url: "redis://redis-service:6379"
  supabase-url: "REPLACE_ME"
  supabase-service-role-key: "REPLACE_ME"
  jwt-secret: "REPLACE_ME_WITH_32+_RANDOM_CHARS"
  database-url: "REPLACE_ME"
  anthropic-api-key: "REPLACE_ME"
  openai-api-key: "REPLACE_ME"
  hubtel-client-id: "REPLACE_ME"
  hubtel-client-secret: "REPLACE_ME"
  hubtel-sender-id: "ResearchPadi"
---
# Basic auth for the admin ingress (htpasswd-style).
# Generate with:  htpasswd -nbB admin <password>  (then paste below)
apiVersion: v1
kind: Secret
metadata:
  name: admin-basic-auth
  namespace: researchpadi
type: Opaque
stringData:
  auth: "REPLACE_ME_WITH_HTPASSWD_HASH"
