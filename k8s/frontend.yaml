apiVersion: apps/v1
kind: Deployment
metadata:
  name: researchpadi-frontend
  namespace: researchpadi
  labels:
    app: researchpadi
    component: frontend
spec:
  # Static SPA is cheap to serve; 4 replicas behind the ingress is plenty
  # for 15-20K concurrent given immutable asset caching + ingress gzip.
  replicas: 4
  selector:
    matchLabels:
      app: researchpadi
      component: frontend
  template:
    metadata:
      labels:
        app: researchpadi
        component: frontend
    spec:
      containers:
        - name: frontend
          image: researchpadi/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: researchpadi
  labels:
    app: researchpadi
    component: frontend
spec:
  selector:
    app: researchpadi
    component: frontend
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP
