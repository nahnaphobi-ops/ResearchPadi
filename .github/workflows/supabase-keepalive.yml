name: Supabase Keep Alive

on:
  schedule:
    # Every 3 days at 14:00 UTC to prevent Supabase from pausing after 7 days of inactivity
    - cron: '0 14 */3 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase API
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            --request GET \
            --url "${{ secrets.SUPABASE_URL }}/rest/v1/users?id=select.limit(1)" \
            --header "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            --header "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
